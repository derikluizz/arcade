<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none';">
  <meta name="referrer" content="no-referrer">
  <title>Asteroids</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
    body {
      background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      height:100dvh; overflow:hidden;
      font-family:'Courier New',monospace; color:#fff;
    }
    #hud {
      display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
      font-size:0.7rem; letter-spacing:2px; color:#0ff;
      margin-bottom:4px;
    }
    canvas { display:block; }
    /* Botões touch */
    #controls {
      display:flex; gap:8px; margin-top:10px;
      flex-wrap:wrap; justify-content:center;
    }
    .btn {
      background:rgba(0,255,255,0.08);
      border:2px solid rgba(0,255,255,0.3);
      border-radius:12px;
      color:#0ff; font-size:1.1rem;
      width:56px; height:56px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active, .btn.pressed { background:rgba(0,255,255,0.3); }
    #btn-shield { color:#fa0; border-color:rgba(255,170,0,0.4); background:rgba(255,170,0,0.08); }
    #btn-shield.pressed { background:rgba(255,170,0,0.3); }
    #btn-fire { color:#ff0; border-color:rgba(255,255,0,0.4); background:rgba(255,255,0,0.08); }
    #btn-fire.pressed { background:rgba(255,255,0,0.3); }
  </style>
</head>
<body>
  <div id="hud">
    <span>PONTOS <b id="score">0</b></span>
    <span>RECORDE <b id="best">0</b></span>
    <span>VIDAS <b id="lives">3</b></span>
    <span>FASE <b id="wave">1</b></span>
  </div>
  <canvas id="c"></canvas>
  <div id="controls">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-thrust">▲</div>
    <div class="btn" id="btn-right">▶</div>
    <div class="btn" id="btn-fire">🔥</div>
    <div class="btn" id="btn-shield">🛡</div>
  </div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H;

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight * 0.72, 600);
  c.width = W = s; c.height = H = s;
}
resize();
window.addEventListener('resize', resize);

const rnd = (a,b)=>Math.random()*(b-a)+a;
const TWO_PI = Math.PI*2;

// Sons
let actx;
function au(){if(!actx)actx=new(AudioContext||webkitAudioContext)();return actx;}
function beep(f,d,t='square',v=0.1){try{const a=au(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}

// Estrelas
let stars=[];
function makeStars(){stars=Array.from({length:80},()=>({x:rnd(0,W),y:rnd(0,H),r:rnd(0.5,1.5),b:rnd(0.3,1)}));}

function makeShip(){return{x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,r:14,shootCooldown:0,shieldCharge:100};}
function makeAsteroid(x,y,size){
  const sides=rndInt(7,12),verts=[];
  for(let i=0;i<sides;i++){const a=(i/sides)*TWO_PI;verts.push({x:Math.cos(a)*size*rnd(0.75,1.2),y:Math.sin(a)*size*rnd(0.75,1.2)});}
  const spd=rnd(0.5,1.5)*(1+wave*0.08),ang=rnd(0,TWO_PI);
  return{x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,rot:0,rotSpd:rnd(-0.03,0.03),size,verts,r:size*0.85};
}
const rndInt=(a,b)=>Math.floor(rnd(a,b+1));

let ship,bullets=[],asteroids=[],particles=[],shieldOn=false;
let score=0,best=0,lives=3,wave=1,running=false,invTimer=0;
let keys={};

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  document.getElementById('lives').textContent=lives;
  document.getElementById('wave').textContent=wave;
}

function explode(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=rnd(0,TWO_PI),spd=rnd(1,5);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:rndInt(20,50),max:50,color});
  }
}

function spawnWave(){
  const count=3+wave;
  for(let i=0;i<count;i++){
    let x,y;
    do{x=rnd(0,W);y=rnd(0,H);}while(Math.hypot(x-ship.x,y-ship.y)<150);
    asteroids.push(makeAsteroid(x,y,rndInt(28,42)));
  }
}

function init(){
  makeStars();
  ship=makeShip();bullets=[];asteroids=[];particles=[];shieldOn=false;
  score=0;lives=3;wave=1;invTimer=120;
  updateHUD();spawnWave();running=true;
}

function shoot(){
  if(ship.shootCooldown>0)return;
  const spd=9;
  bullets.push({x:ship.x+Math.cos(ship.angle)*20,y:ship.y+Math.sin(ship.angle)*20,
    vx:ship.vx+Math.cos(ship.angle)*spd,vy:ship.vy+Math.sin(ship.angle)*spd,life:55});
  ship.shootCooldown=10;
  beep(880,0.08,'square',0.08);
}

function wrapObj(o){if(o.x<0)o.x+=W;if(o.x>W)o.x-=W;if(o.y<0)o.y+=H;if(o.y>H)o.y-=H;}

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  if(running)update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  if(keys['left'])  ship.angle-=0.06*dt;
  if(keys['right']) ship.angle+=0.06*dt;
  if(keys['thrust']){ship.vx+=Math.cos(ship.angle)*0.22*dt;ship.vy+=Math.sin(ship.angle)*0.22*dt;}
  ship.vx*=Math.pow(0.985,dt);ship.vy*=Math.pow(0.985,dt);
  const spd=Math.hypot(ship.vx,ship.vy);if(spd>7){ship.vx=ship.vx/spd*7;ship.vy=ship.vy/spd*7;}
  ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;wrapObj(ship);
  if(ship.shootCooldown>0)ship.shootCooldown-=dt;
  if(keys['fire'])shoot();
  shieldOn=keys['shield']&&ship.shieldCharge>0;
  if(shieldOn)ship.shieldCharge=Math.max(0,ship.shieldCharge-0.6*dt);
  else ship.shieldCharge=Math.min(100,ship.shieldCharge+0.2*dt);
  if(invTimer>0)invTimer-=dt;

  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;wrapObj(b);});
  asteroids.forEach(a=>{a.x+=a.vx*dt;a.y+=a.vy*dt;a.rot+=a.rotSpd*dt;wrapObj(a);});
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;});

  // Bala x asteroide
  const bRm=new Set(),aRm=new Set(),toAdd=[];
  bullets.forEach((b,bi)=>asteroids.forEach((a,ai)=>{
    if(Math.hypot(b.x-a.x,b.y-a.y)<a.r&&!aRm.has(ai)){
      bRm.add(bi);aRm.add(ai);
      score+=a.size>30?10:a.size>16?20:40;if(score>best)best=score;
      updateHUD();explode(a.x,a.y,'#fa0',a.size>20?14:7);
      beep(200,0.12,'sawtooth',0.1);
      if(a.size>16)for(let k=0;k<2;k++)toAdd.push(makeAsteroid(a.x,a.y,Math.floor(a.size*0.55)));
    }
  }));
  bullets=bullets.filter((_,i)=>!bRm.has(i));
  asteroids=asteroids.filter((_,i)=>!aRm.has(i));
  asteroids.push(...toAdd);

  if(asteroids.length===0){wave++;updateHUD();spawnWave();invTimer=90;}

  // Nave x asteroide
  if(invTimer<=0){
    asteroids.forEach(a=>{
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r-4){
        if(shieldOn&&ship.shieldCharge>0){
          explode(a.x,a.y,'#0ff',10);
          const idx=asteroids.indexOf(a);asteroids.splice(idx,1);
          if(a.size>16)for(let k=0;k<2;k++)asteroids.push(makeAsteroid(a.x,a.y,Math.floor(a.size*0.55)));
          ship.shieldCharge=Math.max(0,ship.shieldCharge-30);
        } else {
          explode(ship.x,ship.y,'#0ff',20);beep(100,0.3,'sawtooth',0.15);
          lives--;updateHUD();
          if(lives<=0){running=false;}
          else{ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;invTimer=150;}
        }
      }
    });
  }
}

function render(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TWO_PI);ctx.fillStyle=`rgba(255,255,255,${s.b})`;ctx.fill();});
  particles.forEach(p=>{const a=p.life/p.max;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.beginPath();a.verts.forEach((v,i)=>i?ctx.lineTo(v.x,v.y):ctx.moveTo(v.x,v.y));
    ctx.closePath();ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
  bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,TWO_PI);ctx.fillStyle='#ff0';ctx.fill();});

  if(running && ship){
    if(invTimer<=0||Math.floor(invTimer/4)%2===0){
      ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
      if(shieldOn){ctx.beginPath();ctx.arc(0,0,ship.r+8,0,TWO_PI);ctx.strokeStyle=`rgba(0,200,255,0.6)`;ctx.lineWidth=3;ctx.stroke();}
      if(keys['thrust']){ctx.beginPath();const fl=rnd(10,20);ctx.moveTo(-10,6);ctx.lineTo(-10-fl,0);ctx.lineTo(-10,-6);ctx.strokeStyle='#f80';ctx.lineWidth=2;ctx.stroke();}
      ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,10);ctx.lineTo(-6,0);ctx.lineTo(-12,-10);ctx.closePath();
      ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    }
  }

  // Barra de escudo
  if(running){
    const bw=Math.min(W*0.25,100),bh=6,bx=10,by=H-20;
    ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,bh);
    const pct=ship.shieldCharge/100;
    ctx.fillStyle=pct>0.5?'#0ff':pct>0.25?'#fa0':'#f44';
    ctx.fillRect(bx,by,bw*pct,bh);
    ctx.strokeStyle='#444';ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#888';ctx.font='9px Courier New';ctx.fillText('ESCUDO',bx,by-3);
  }

  if(!running){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle=lives<=0?'#f44':'#0ff';
    ctx.font=`bold ${W*0.08}px Courier New`;
    ctx.fillText(lives<=0?'GAME OVER':'PAUSADO',W/2,H/2-20);
    if(lives<=0){ctx.fillStyle='#0ff';ctx.font=`${W*0.05}px Courier New`;ctx.fillText('Pontos: '+score,W/2,H/2+20);}
    ctx.fillStyle='#555';ctx.font=`${W*0.035}px Courier New`;
    ctx.fillText('Toque para reiniciar',W/2,H/2+50);ctx.textAlign='left';
  }
}

// ── Teclado ──
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')keys['left']=true;
  if(e.key==='ArrowRight')keys['right']=true;
  if(e.key==='ArrowUp')keys['thrust']=true;
  if(e.key===' '){e.preventDefault();keys['fire']=true;}
  if(e.key==='z'||e.key==='Z')keys['shield']=true;
  if(!running)init();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')keys['left']=false;
  if(e.key==='ArrowRight')keys['right']=false;
  if(e.key==='ArrowUp')keys['thrust']=false;
  if(e.key===' ')keys['fire']=false;
  if(e.key==='z'||e.key==='Z')keys['shield']=false;
});

// ── Botões touch ──
function addBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e=>{e.preventDefault();keys[key]=true;el.classList.add('pressed');if(!running)init();},{passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown',  ()=>{keys[key]=true;if(!running)init();});
  el.addEventListener('mouseup',    ()=>keys[key]=false);
}
addBtn('btn-left','left');addBtn('btn-right','right');
addBtn('btn-thrust','thrust');addBtn('btn-fire','fire');addBtn('btn-shield','shield');

c.addEventListener('touchstart',e=>{e.preventDefault();if(!running)init();},{passive:false});
c.addEventListener('click',()=>{if(!running)init();});

// Tela inicial
makeStars();
ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TWO_PI);ctx.fillStyle=`rgba(255,255,255,${s.b})`;ctx.fill();});
ctx.textAlign='center';ctx.fillStyle='#0ff';ctx.font=`bold ${W*0.09}px Courier New`;
ctx.fillText('ASTEROIDS',W/2,H/2-10);
ctx.fillStyle='#555';ctx.font=`${W*0.04}px Courier New`;
ctx.fillText('Toque para começar',W/2,H/2+30);ctx.textAlign='left';

requestAnimationFrame(loop);
</script>
</body>
</html>
