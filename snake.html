<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none';">
  <meta name="referrer" content="no-referrer">
  <title>Cobrinha</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
    body {
      background:#1a1a2e;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100dvh;
      font-family:'Segoe UI',sans-serif;
      color:#eee;
      overflow:hidden;
    }
    h1 { font-size:1.4rem; color:#4ecca3; margin-bottom:6px; }
    #info { display:flex; gap:30px; font-size:0.9rem; margin-bottom:8px; }
    #info span { color:#4ecca3; font-weight:bold; }
    canvas { border:3px solid #4ecca3; border-radius:4px; display:block; }
    #msg { margin-top:10px; font-size:0.8rem; color:#aaa; text-align:center; }
    /* D-pad touch */
    #dpad {
      display:none;
      margin-top:14px;
      display:grid;
      grid-template-columns: repeat(3,52px);
      grid-template-rows: repeat(3,52px);
      gap:4px;
    }
    .dp {
      background:rgba(78,204,163,0.15);
      border:2px solid rgba(78,204,163,0.4);
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:background 0.1s;
    }
    .dp:active { background:rgba(78,204,163,0.4); }
    .dp.blank { border:none; background:none; }
  </style>
</head>
<body>
  <h1>🐍 Cobrinha</h1>
  <div id="info">Pontos: <span id="score">0</span> &nbsp; Recorde: <span id="best">0</span></div>
  <canvas id="canvas"></canvas>
  <p id="msg">Toque na tela para começar</p>

  <div id="dpad">
    <div class="dp blank"></div>
    <div class="dp" id="btn-up">▲</div>
    <div class="dp blank"></div>
    <div class="dp" id="btn-left">◀</div>
    <div class="dp blank"></div>
    <div class="dp" id="btn-right">▶</div>
    <div class="dp blank"></div>
    <div class="dp" id="btn-down">▼</div>
    <div class="dp blank"></div>
  </div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const msgEl   = document.getElementById('msg');
  const dpad    = document.getElementById('dpad');

  const GRID = 20;
  let COLS, ROWS, W, H;

  function resize() {
    const maxW = Math.min(window.innerWidth - 16, 400);
    const size = Math.floor(maxW / GRID) * GRID;
    canvas.width  = size;
    canvas.height = size;
    W = H = size;
    COLS = ROWS = size / GRID;
  }
  resize();
  window.addEventListener('resize', () => { resize(); if (!running) drawTitle(); });

  let snake, dir, next, food, score, best=0, loop, running=false;

  function init() {
    snake = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) }];
    dir  = { x:1, y:0 };
    next = { x:1, y:0 };
    score = 0; scoreEl.textContent = 0;
    placeFood();
    clearInterval(loop);
    loop = setInterval(tick, 130);
    running = true;
    msgEl.textContent = 'Swipe ou use o D-pad';
  }

  function placeFood() {
    do { food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
    while (snake.some(s => s.x===food.x && s.y===food.y));
  }

  function setDir(d) {
    if (!running) { init(); return; }
    if (d.x !== -dir.x || d.y !== -dir.y) next = d;
  }

  function tick() {
    dir = { ...next };
    const head = { x: snake[0].x+dir.x, y: snake[0].y+dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return gameOver();
    if (snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score++; scoreEl.textContent=score;
      if (score>best) { best=score; bestEl.textContent=best; }
      placeFood();
    } else { snake.pop(); }
    draw();
  }

  function draw() {
    ctx.fillStyle='#0f3460'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=0.5;
    for(let i=0;i<=COLS;i++){ ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,H);ctx.stroke(); }
    for(let j=0;j<=ROWS;j++){ ctx.beginPath();ctx.moveTo(0,j*GRID);ctx.lineTo(W,j*GRID);ctx.stroke(); }
    ctx.fillStyle='#e94560'; ctx.beginPath();
    ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,GRID/2-2,0,Math.PI*2); ctx.fill();
    snake.forEach((seg,i)=>{
      ctx.fillStyle=`rgba(78,204,163,${1-i/snake.length*0.6})`;
      ctx.beginPath(); ctx.roundRect(seg.x*GRID+1,seg.y*GRID+1,GRID-2,GRID-2,4); ctx.fill();
    });
    const h=snake[0];
    ctx.fillStyle='#0f3460';
    ctx.beginPath(); ctx.arc(h.x*GRID+(dir.x>0?14:dir.x<0?6:6), h.y*GRID+(dir.y>0?14:dir.y<0?6:6),2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(h.x*GRID+(dir.x>0?14:dir.x<0?6:14),h.y*GRID+(dir.y>0?14:dir.y<0?6:14),2,0,Math.PI*2); ctx.fill();
  }

  function gameOver() {
    clearInterval(loop); running=false;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e94560'; ctx.font=`bold ${W/10}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2-10);
    ctx.fillStyle='#eee'; ctx.font=`${W/18}px sans-serif`;
    ctx.fillText(`Pontos: ${score}`,W/2,H/2+26);
    msgEl.textContent='Toque para reiniciar';
  }

  function drawTitle() {
    ctx.fillStyle='#0f3460'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#4ecca3'; ctx.font=`bold ${W/14}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('Toque para começar',W/2,H/2);
  }

  // ── Teclado ──
  const DIRS = {
    ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
    ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
    ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
    ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
  };
  document.addEventListener('keydown', e => {
    const d=DIRS[e.key]; if(d){ e.preventDefault(); setDir(d); } else if(!running) init();
  });

  // ── D-pad buttons ──
  document.getElementById('btn-up').addEventListener('touchstart',    e=>{e.preventDefault();setDir({x:0,y:-1});},{passive:false});
  document.getElementById('btn-down').addEventListener('touchstart',  e=>{e.preventDefault();setDir({x:0,y:1});},{passive:false});
  document.getElementById('btn-left').addEventListener('touchstart',  e=>{e.preventDefault();setDir({x:-1,y:0});},{passive:false});
  document.getElementById('btn-right').addEventListener('touchstart', e=>{e.preventDefault();setDir({x:1,y:0});},{passive:false});

  // ── Swipe ──
  let tx=0, ty=0;
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:false});
  canvas.addEventListener('touchend', e=>{
    e.preventDefault();
    if(!running){ init(); return; }
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?{x:1,y:0}:{x:-1,y:0});
    else setDir(dy>0?{x:0,y:1}:{x:0,y:-1});
  },{passive:false});

  // ── Clique desktop ──
  canvas.addEventListener('click', ()=>{ if(!running) init(); });

  drawTitle();
</script>
</body>
</html>
